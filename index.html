<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>VR 시기능 훈련 시스템 V18.4 (안정형)</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Malgun Gothic', sans-serif; user-select: none; }
    
    /* 왼쪽 컨트롤 패널 */
    #control-panel {
      position: absolute; top: 15px; left: 15px; z-index: 99999;
      background: rgba(11, 15, 26, 0.95); color: white; padding: 20px;
      border-radius: 12px; border: 1px solid #3b82f6; width: 310px;
      max-height: 90vh; overflow-y: auto;
    }
    .center-info { font-size: 11px; color: #94a3b8; text-align: center; margin-bottom: 2px; }
    .center-title { font-size: 16px; font-weight: bold; color: #38bdf8; text-align: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #3b82f6; }
    .panel-group { margin-bottom: 12px; background: rgba(30, 41, 59, 0.5); padding: 10px; border-radius: 8px; }
    label { display: block; margin-bottom: 6px; font-size: 12px; color: #cbd5e1; font-weight: bold; }
    select, input[type="range"] { width: 100%; padding: 6px; background: #1e293b; color: white; border: 1px solid #475569; border-radius: 6px; box-sizing: border-box; font-size: 12px; }
    .display-value { float: right; color: #38bdf8; font-weight: bold; }
    .btn { width: 100%; padding: 10px; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 13px; transition: all 0.2s ease; }
    
    /* 대기 상태 초록 버튼 */
    #start-btn { background: #22c55e; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); }
    /* 1차 락 해제 후 대기 상태 노란 버튼 */
    #start-btn.ready-to-launch { background: #eab308; color: #000; box-shadow: 0 4px 15px rgba(234, 179, 8, 0.5); animation: pulse 1.5s infinite; }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }
    
    /* 오른쪽 스코어 및 실시간 기록실 */
    #score-board { 
      position: fixed; top: 20px; right: 20px; z-index: 99999; 
      background: rgba(15, 23, 42, 0.95); color: #fff; padding: 15px; 
      border-radius: 10px; border: 2px solid #38bdf8; font-size: 13px; width: 280px; 
    }
    .board-status { color: #ef4444; font-family: monospace; font-size: 16px; margin-bottom: 8px; }
    .exit-vr-btn { width: 100%; background: #ef4444; color: white; border: none; border-radius: 4px; padding: 6px; font-weight: bold; cursor: pointer; font-size: 11px; margin-top: 8px; display: none; }
    
    .history-container { margin-top: 10px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; height: 180px; overflow-y: auto; padding: 5px; }
    .history-item { font-family: monospace; font-size: 11px; border-bottom: 1px solid #1e293b; padding: 4px 2px; color: #cbd5e1; line-height: 1.3; }
    .history-item.success { color: #4ade80; }
    .history-item.fail { color: #f87171; }

    #result-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100000; background: rgba(11, 16, 26, 0.98); color: white; padding: 35px 50px; border-radius: 15px; border: 3px solid #38bdf8; text-align: center; }
    #result-modal h1 { color: #38bdf8; margin-top: 0; }
    #result-modal .final-score { font-size: 42px; color: #eab308; margin: 20px 0; font-weight: bold; }
    #result-modal .reset-btn { background: #38bdf8; color: #000; padding: 10px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
  </style>
  
  <script>
    AFRAME.registerComponent('stereo-eye-lock', {
      schema: { eye: {type: 'string', default: 'both'} },
      init: function () {
        this.layerMask = (this.data.eye === 'left') ? 1 : (this.data.eye === 'right' ? 2 : 0);
        this.el.addEventListener('object3dset', () => { this.applyLayer(); });
        this.applyLayer();
      },
      applyLayer: function () {
        const obj = this.el.getObject3D('mesh') || this.el.object3D;
        if (obj) {
          obj.layers.set(this.layerMask);
          obj.traverse(child => { if(child.layers) child.layers.set(this.layerMask); });
        }
      }
    });
  </script>
</head>
<body>

  <div id="control-panel">
    <div class="center-info">시기능 시지각 전문 훈련 기관</div>
    <div class="center-title">한국시기능훈련센터 성서계명대점</div>
    
    <div class="panel-group">
      <label>⏱️ 총 훈련 시간 설정</label>
      <select id="training-time-select">
        <option value="60">1분 (테스트)</option>
        <option value="300">5분 (기본)</option>
        <option value="600" selected>10분 (정밀)</option>
      </select>
    </div>

    <div class="panel-group">
      <label>👁️ 안구 선택 모드 (단안 지원)</label>
      <select id="eye-mode-select">
        <option value="alternating" selected>교대 출현 (양안 융합 훈련 - OU)</option>
        <option value="leftOnly">왼쪽 눈 전용 훈련 (L)</option>
        <option value="rightOnly">오른쪽 눈 전용 훈련 (R)</option>
      </select>
    </div>

    <div class="panel-group">
      <label>🎮 훈련 구동 방식</label>
      <select id="run-mode-select" onchange="toggleRunModeUI()">
        <option value="manual" selected>수동 모드 (배경 방향 직접 지정)</option>
        <option value="auto">자동 모드 (배경 방향 주기적 전환)</option>
      </select>
    </div>

    <div id="manual-direction-group" class="panel-group">
      <label>🗺️ 수동 배경 이동 방향 선택</label>
      <select id="manual-dir-select">
        <option value="right" selected>우측으로 이동 (수평 스크롤)</option>
        <option value="left">좌측으로 이동 (수평 스크롤)</option>
        <option value="up">상측으로 이동 (수직 눕힘 스크롤)</option>
        <option value="down">하측으로 이동 (수직 눕힘 스크롤)</option>
      </select>
    </div>

    <div id="auto-time-group" class="panel-group" style="display: none;">
      <label>🔄 자동 배경 전환 주기 설정</label>
      <select id="auto-interval-select">
        <option value="120" selected>2분 단위 자동 전환</option>
        <option value="180">3분 단위 자동 전환</option>
      </select>
    </div>

    <div class="panel-group">
      <label>🏁 배경 격자 크기 조절 <span class="display-value" id="grid-size-txt">보통 (6)</span></label>
      <input type="range" id="grid-size-slider" min="2" max="15" value="6" step="1">
    </div>

    <div class="panel-group">
      <label>🔍 배경 자극 사이즈 축소(반경) <span class="display-value" id="bg-size-txt">40m</span></label>
      <input type="range" id="bg-size-slider" min="10" max="60" value="40" step="5">
    </div>

    <div class="panel-group">
      <label>↔️ 풍선 출현 시야 반경 <span class="display-value" id="range-txt">1.40</span></label>
      <input type="range" id="range-slider" min="0.50" max="2.40" value="1.40" step="0.10">
    </div>

    <div class="panel-group">
      <label>🔄 배경 스크롤 속도 <span class="display-value" id="bg-speed-txt">2</span></label>
      <input type="range" id="bg-speed-slider" min="0" max="60" value="2" step="1">
    </div>
    
    <button id="start-btn" class="btn" onclick="handleStartButtonClick()">▶️ 훈련 시작</button>
  </div>

  <div id="score-board">
    <div class="board-status">남은시간: <span id="val-time">10:00</span></div>
    <div style="color: #eab308; font-weight: bold; margin-bottom: 4px;">상태: <span id="active-eye-txt">-</span></div>
    <div style="color: #38bdf8; font-weight: bold; margin-bottom: 4px;">배경 자극: <span id="active-pattern-txt">우측 이동</span></div>
    <div style="font-weight: bold; margin-bottom: 6px;">점수: <span id="val-score" style="color:#22c55e;">0000</span></div>
    <div style="color: #a7f3d0; font-size: 11px;" id="status-txt">훈련을 시작해 주세요.</div>
    
    <div style="margin-top: 10px; font-size: 11px; font-weight: bold; color: #94a3b8; border-top: 1px solid #334155; padding-top: 6px;">📋 실시간 훈련 기록 (최신순)</div>
    <div class="history-container" id="history-log"></div>

    <button id="exit-vr-control" class="exit-vr-btn" onclick="exitVRModeManually()">🔴 훈련 중단</button>
  </div>

  <div id="result-modal">
    <h1>🎉 시기능 훈련 완료 🎉</h1>
    <p style="color: #aaa; margin: 0;">오늘의 안구 훈련이 성공적으로 끝났습니다.</p>
    <div class="final-score"><span id="modal-final-score">0</span> 점</div>
    <button class="reset-btn" onclick="location.reload()">처음으로</button>
  </div>

  <a-scene background="color: #000000" vr-mode-ui="enabled: true">
    <a-assets>
      <canvas id="bgCheckerCanvas"></canvas>
    </a-assets>

    <a-cylinder id="rotating-bg" src="#bgCheckerCanvas" radius="40" height="120" segments-radial="32" material="shader: flat; side: back;" stereo-eye-lock="eye: both" position="0 0 0"></a-cylinder>

    <a-entity id="cameraRig">
      <a-entity id="mainCamera" camera look-controls position="0 1.6 0">
        <a-entity id="centerFixationRay" raycaster="objects: .gaze-secure-trigger; far: 100; interval: 10;"></a-entity>
        
        <a-ring id="gaze-ring-left" radius-inner="0.02" radius-outer="0.03" color="#000000" position="-0.03 0 -1" material="shader: flat; opacity: 0.9; depthTest: false;" stereo-eye-lock="eye: left"></a-ring>
        <a-ring id="gaze-ring-right" radius-inner="0.02" radius-outer="0.03" color="#000000" position="0.03 0 -1" material="shader: flat; opacity: 0.9; depthTest: false;" stereo-eye-lock="eye: right"></a-ring>
      </a-entity>
    </a-entity>

    <a-entity id="magic-eye-board" visible="true">
      <a-entity id="left-eye-container" stereo-eye-lock="eye: left">
        <a-sphere id="balloon-left" color="#ff2a2a" material="roughness: 0.15; metalness: 0.2;">
          <a-cone id="cone-left" color="#cc1111"></a-cone>
        </a-sphere>
      </a-entity>
      
      <a-entity id="right-eye-container" stereo-eye-lock="eye: right">
        <a-sphere id="balloon-right" color="#10b981" material="roughness: 0.15; metalness: 0.2;">
          <a-cone id="cone-right" color="#047857"></a-cone>
        </a-sphere>
      </a-entity>

      <a-entity id="gaze-collision-trigger" class="gaze-secure-trigger" material="visible: false;" stereo-eye-lock="eye: both"></a-entity>
    </a-entity>

    <a-entity id="particle-group"></a-entity>
  </a-scene>

  <script>
    let currentGridSize = 6; 
    let isBrowserUnlocked = false; // 브라우저 보안 잠금 해제 상태 관리 변수

    function updateGridTexture() {
      const bgCanvas = document.getElementById('bgCheckerCanvas');
      const bgCtx = bgCanvas.getContext('2d');
      bgCanvas.width = 512; bgCanvas.height = 512;
      bgCtx.clearRect(0, 0, 512, 512);
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          bgCtx.fillStyle = ((r + c) % 2 === 0) ? '#FFFFFF' : '#000000';
          bgCtx.fillRect(c * 64, r * 64, 64, 64);
        }
      }
      const sky = document.getElementById('rotating-bg');
      if (sky) {
        let repeatX = currentGridSize * 2; let repeatY = currentGridSize;
        sky.setAttribute('material', { shader: 'flat', src: '#bgCheckerCanvas', side: 'back', repeat: `${repeatX} ${repeatY}` });
        if (sky.components.material && sky.components.material.material.map) {
          sky.components.material.material.map.needsUpdate = true;
        }
      }
    }

    let audioCtx = null; let score = 0; let randomRange = 1.40; 
    let rotationSpeed = 2; let isTrainingActive = false; let isPopping = false; 
    let elapsedInterval = null; let totalSecondsElapsed = 0; let targetSeconds = 600;      
    let activeTurn = "left"; let currentX = 0, currentY = 1.6, currentZ = -16.0;
    let gazeTimer = null; let autoStep = 0; let internalAutoTime = 0;
    let currentRotationY = 0; let currentRotationX = 0;

    function toggleRunModeUI() {
      const runMode = document.getElementById('run-mode-select').value;
      document.getElementById('manual-direction-group').style.display = (runMode === 'manual') ? 'block' : 'none';
      document.getElementById('auto-time-group').style.display = (runMode === 'auto') ? 'block' : 'none';
    }

    document.getElementById('grid-size-slider').addEventListener('input', (e) => {
      currentGridSize = parseInt(e.target.value);
      let labelText = currentGridSize;
      if (currentGridSize <= 3) labelText = `매우 작게 (${currentGridSize})`;
      else if (currentGridSize <= 5) labelText = `작게 (${currentGridSize})`;
      else if (currentGridSize <= 8) labelText = `보통 (${currentGridSize})`;
      else if (currentGridSize <= 12) labelText = `크게 (${currentGridSize})`;
      else labelText = `매우 크게 (${currentGridSize})`;
      document.getElementById('grid-size-txt').innerText = labelText;
      updateGridTexture();
    });

    document.getElementById('bg-size-slider').addEventListener('input', (e) => {
      const radiusVal = parseInt(e.target.value);
      document.getElementById('bg-size-txt').innerText = radiusVal + "m";
      const sky = document.getElementById('rotating-bg');
      if(sky) sky.setAttribute('radius', radiusVal);
    });

    document.getElementById('range-slider').addEventListener('input', (e) => {
      randomRange = parseFloat(e.target.value);
      document.getElementById('range-txt').innerText = randomRange.toFixed(2);
      if(isTrainingActive) renderRandomTargetsOnly();
    });
    
    document.getElementById('bg-speed-slider').addEventListener('input', (e) => {
      rotationSpeed = parseInt(e.target.value);
      document.getElementById('bg-speed-txt').innerText = rotationSpeed;
    });

    // [핵심 변경] 원장님이 정의하신 2단계 클릭 프로세스 공식 구현 함수
    function handleStartButtonClick() {
      const startBtn = document.getElementById('start-btn');

      // 단계 1: 첫 번째 클릭 (오디오 객체를 생성하며 브라우저 보안 락을 완벽히 해제)
      if (!isBrowserUnlocked) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 미세한 음소거 주파수를 발생시켜 시스템 활성화 도장 받기
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0.001, audioCtx.currentTime);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);

        // 버튼 상태 변경 및 2차 대기 전환
        isBrowserUnlocked = true;
        startBtn.innerText = "🚀 한 번 더 누르면 시작됩니다!";
        startBtn.classList.add('ready-to-launch');
        document.getElementById('status-txt').innerText = "보안 잠금 해제 완료. 다시 누르세요.";
        return; 
      }

      // 단계 2: 두 번째 클릭 (이미 해제된 상태이므로 VR 모드로 에러 없이 강제 진입)
      startFusionTraining();
    }

    function startFusionTraining() {
      isTrainingActive = true; isPopping = false;
      targetSeconds = parseInt(document.getElementById('training-time-select').value);
      
      document.getElementById('control-panel').style.display = 'none';
      document.getElementById('exit-vr-control').style.display = 'block';
      document.getElementById('history-log').innerHTML = ''; 
      
      const eyeMode = document.getElementById('eye-mode-select').value;
      if(eyeMode === "rightOnly") activeTurn = "right"; else activeTurn = "left";

      document.getElementById('magic-eye-board').setAttribute('visible', 'true');
      renderRandomTargetsOnly(); 
      startElapsedClock();
      
      const sceneEl = document.querySelector('a-scene');
      if (sceneEl.hasLoaded) { sceneEl.enterVR(); } else { sceneEl.addEventListener('loaded', () => { sceneEl.enterVR(); }); }
    }

    function addHistoryLog(status, activeEye, typeMode) {
      const logContainer = document.getElementById('history-log');
      const now = new Date();
      const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
      let eyeTag = "OU";
      if(typeMode === "leftOnly") eyeTag = "L";
      else if(typeMode === "rightOnly") eyeTag = "R";
      else { eyeTag = (activeEye === "left") ? "L" : "R"; }
      const logItem = document.createElement('div');
      logItem.className = `history-item ${status === '성공' ? 'success' : 'fail'}`;
      logItem.innerText = `[${timeStr}] [${eyeTag}] 풍선 주시 고정 - ${status}`;
      logContainer.insertBefore(logItem, logContainer.firstChild);
    }

    function renderRandomTargetsOnly() {
      if (!isTrainingActive) return;
      const eyeMode = document.getElementById('eye-mode-select').value;
      if (eyeMode === "leftOnly") { activeTurn = "left"; } 
      else if (eyeMode === "rightOnly") { activeTurn = "right"; }

      const cameraEl = document.getElementById('mainCamera');
      let camPos = {x: 0, y: 1.6, z: 0};
      if (cameraEl && cameraEl.object3D) {
        camPos.x = cameraEl.object3D.position.x;
        camPos.y = cameraEl.object3D.position.y;
        camPos.z = cameraEl.object3D.position.z;
      }

      let radiusRadius = 1.80; let zOffset = 16.0; let baseZ = camPos.z - zOffset; let spreadFactor = zOffset / 4.2;
      let randX = camPos.x + (Math.random() - 0.5) * (randomRange * 1.3 * spreadFactor);
      let randY = camPos.y + (Math.random() - 0.5) * (randomRange * 1.0 * spreadFactor);

      if (randY < camPos.y - (0.5 * spreadFactor)) randY = camPos.y - (0.5 * spreadFactor);
      if (randY > camPos.y + (0.7 * spreadFactor)) randY = camPos.y + (0.7 * spreadFactor);
      currentX = randX; currentY = randY; currentZ = baseZ;

      const cLeft = document.getElementById('left-eye-container');
      const cRight = document.getElementById('right-eye-container');
      const bLeft = document.getElementById('balloon-left');
      const bRight = document.getElementById('balloon-right');
      const coneLeft = document.getElementById('cone-left');
      const coneRight = document.getElementById('cone-right');
      const secureTrigger = document.getElementById('gaze-collision-trigger');
      const ringLeft = document.getElementById('gaze-ring-left');
      const ringRight = document.getElementById('gaze-ring-right');
      const raycasterEl = document.getElementById('centerFixationRay');
      let eyeDisplayMode = (eyeMode === "alternating") ? "OU" : (eyeMode === "leftOnly" ? "L" : "R");

      if (activeTurn === "left") {
        document.getElementById('active-eye-txt').innerText = `왼쪽눈 활성 (${eyeDisplayMode})`;
        document.getElementById('active-eye-txt').style.color = "#ff2a2a";
        cLeft.setAttribute('visible', 'true'); cRight.setAttribute('visible', 'false');
        ringLeft.setAttribute('visible', 'true'); ringRight.setAttribute('visible', 'false');
        if (raycasterEl) raycasterEl.setAttribute('position', '-0.03 0 0');
        bLeft.setAttribute('position', `${randX} ${randY} ${baseZ}`);
        bLeft.setAttribute('radius', radiusRadius);
        coneLeft.setAttribute('position', `0 ${-radiusRadius * 1.1} 0`);
        coneLeft.setAttribute('radius-bottom', `${radiusRadius * 0.15}`);
        coneLeft.setAttribute('height', `${radiusRadius * 0.25}`);
      } else {
        document.getElementById('active-eye-txt').innerText = `오른쪽눈 활성 (${eyeDisplayMode})`;
        document.getElementById('active-eye-txt').style.color = "#10b981";
        cLeft.setAttribute('visible', 'false'); cRight.setAttribute('visible', 'true');
        ringLeft.setAttribute('visible', 'false'); ringRight.setAttribute('visible', 'true');
        if (raycasterEl) raycasterEl.setAttribute('position', '0.03 0 0');
        bRight.setAttribute('position', `${randX} ${randY} ${baseZ}`);
        bRight.setAttribute('radius', radiusRadius);
        coneRight.setAttribute('position', `0 ${-radiusRadius * 1.1} 0`);
        coneRight.setAttribute('radius-bottom', `${radiusRadius * 0.15}`);
        coneRight.setAttribute('height', `${radiusRadius * 0.25}`);
      }
      if (secureTrigger) {
        secureTrigger.setAttribute('position', `${randX} ${randY} ${baseZ}`);
        secureTrigger.setAttribute('geometry', `primitive: sphere; radius: 2.5`);
        if (!isPopping && !secureTrigger.classList.contains('gaze-secure-trigger')) secureTrigger.classList.add('gaze-secure-trigger');
      }
    }

    function setupVRHardwareLayers() {
      const sceneEl = document.querySelector('a-scene');
      sceneEl.addEventListener('enter-vr', () => {
        const camera = sceneEl.camera;
        if (camera && camera.isArrayCamera) {
          camera.cameras[0].layers.enable(1); camera.cameras[0].layers.disable(2);
          camera.cameras[1].layers.enable(2); camera.cameras[1].layers.disable(1);
        }
      });
    }

    function checkTargetGazeIntersection() {
      requestAnimationFrame(checkTargetGazeIntersection);
      if (!isTrainingActive || isPopping) return; 
      const raycasterEl = document.getElementById('centerFixationRay');
      if (!raycasterEl) return;
      let raycasterComponent = raycasterEl.components.raycaster;
      if (raycasterComponent && raycasterComponent.intersections && raycasterComponent.intersections.length > 0) {
        if (!gazeTimer) {
          document.getElementById('status-txt').innerText = "🎯 융합 인지 및 주시 유지 (1초)...";
          gazeTimer = setTimeout(() => {
            const secureTrigger = document.getElementById('gaze-collision-trigger');
            if (secureTrigger) secureTrigger.classList.remove('gaze-secure-trigger');
            isPopping = true; gazeTimer = null; popTargetSuccess();
          }, 1000); 
        }
      } else {
        if (gazeTimer) {
          clearTimeout(gazeTimer); gazeTimer = null;
          document.getElementById('status-txt').innerText = "훈련 진행 중...";
          const eyeMode = document.getElementById('eye-mode-select').value;
          addHistoryLog("실패", activeTurn, eyeMode);
        }
      }
    }

    function popTargetSuccess() {
      playPopSound(); score += 1000;
      document.getElementById('val-score').innerText = score.toString().padStart(4, '0');
      const eyeMode = document.getElementById('eye-mode-select').value;
      addHistoryLog("성공", activeTurn, eyeMode);
      triggerParticlesEmission(currentX, currentY, currentZ, 30); 
      if (eyeMode === "alternating") activeTurn = (activeTurn === "left") ? "right" : "left";
      document.getElementById('magic-eye-board').setAttribute('visible', 'false');
      setTimeout(() => {
        if (!isTrainingActive) return;
        isPopping = false; renderRandomTargetsOnly(); 
        document.getElementById('magic-eye-board').setAttribute('visible', 'true'); 
      }, 400); 
    }

    function animateBackgroundAndScroll() {
      requestAnimationFrame(animateBackgroundAndScroll);
      if (!isTrainingActive) return;
      const runMode = document.getElementById('run-mode-select').value;
      let activeBgDirection = "right";
      if (runMode === "manual") activeBgDirection = document.getElementById('manual-dir-select').value;
      else { const steps = ["right", "left", "up", "down"]; activeBgDirection = steps[autoStep]; }
      const sky = document.getElementById('rotating-bg');
      let directionKr = "";
      if (sky) {
        if (activeBgDirection === "right" || activeBgDirection === "left") {
          if (activeBgDirection === "right") { directionKr = "우측 수평 스크롤 (➔)"; currentRotationY += (rotationSpeed * 0.1); }
          else { directionKr = "좌측 수평 스크롤 (⬅)"; currentRotationY -= (rotationSpeed * 0.1); }
          sky.setAttribute('rotation', `0 ${currentRotationY} 0`);
        } else if (activeBgDirection === "up" || activeBgDirection === "down") {
          if (activeBgDirection === "up") { directionKr = "상측 수직 스크롤 (⬆)"; currentRotationX -= (rotationSpeed * 0.1); }
          else { directionKr = "하측 수직 스크롤 (⬇)"; currentRotationX += (rotationSpeed * 0.1); }
          sky.setAttribute('rotation', `${currentRotationX} 0 90`);
        }
      }
      document.getElementById('active-pattern-txt').innerText = (runMode === "manual" ? "수동: " : "자동: ") + directionKr;
    }

    function startElapsedClock() {
      if (elapsedInterval) clearInterval(elapsedInterval);
      totalSecondsElapsed = 0; internalAutoTime = 0; autoStep = 0;
      document.getElementById('status-txt').innerText = "훈련 진행 중...";
      elapsedInterval = setInterval(() => {
        if (!isTrainingActive) return;
        totalSecondsElapsed++; internalAutoTime++;
        let totalMin = Math.floor((targetSeconds - totalSecondsElapsed) / 60);
        let totalSec = (targetSeconds - totalSecondsElapsed) % 60;
        document.getElementById('val-time').innerText = `${totalMin.toString().padStart(2, '0')}:${totalSec.toString().padStart(2, '0')}`;
        const runMode = document.getElementById('run-mode-select').value;
        if (runMode === "auto") {
          const changePeriod = parseInt(document.getElementById('auto-interval-select').value);
          if (internalAutoTime >= changePeriod) { internalAutoTime = 0; autoStep = (autoStep + 1) % 4; }
        }
        if (totalSecondsElapsed >= targetSeconds) { 
          if(gazeTimer) { clearTimeout(gazeTimer); gazeTimer = null; }
          clearInterval(elapsedInterval); playFanfareAndFinish(); 
        }
      }, 1000);
    }

    function playFanfareAndFinish() {
      isTrainingActive = false;
      document.getElementById('magic-eye-board').setAttribute('visible', 'false');
      document.getElementById('exit-vr-control').style.display = 'none';
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
      notes.forEach((freq, index) => {
        setTimeout(() => {
          const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
          osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
          osc.connect(gainNode); gainNode.connect(audioCtx.destination);
          osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }, index * 120);
      });
      setTimeout(() => {
        const sceneEl = document.querySelector('a-scene');
        if (sceneEl && sceneEl.is('vr-mode')) sceneEl.exitVR();
        document.getElementById('modal-final-score').innerText = score;
        document.getElementById('result-modal').style.display = 'block';
      }, 1200);
    }

    function playPopSound() {
      if (!audioCtx) return;
      const osc1 = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
      osc1.type = 'sine'; osc1.frequency.setValueAtTime(440, audioCtx.currentTime); osc1.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
      gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
      osc1.connect(gainNode); gainNode.connect(audioCtx.destination);
      osc1.start(); osc1.stop(audioCtx.currentTime + 0.12);
    }

    function triggerParticlesEmission(x, y, z, count) {
      const pGroup = document.getElementById('particle-group');
      for (let i = 0; i < count; i++) {
        const p = document.createElement('a-box');
        p.setAttribute('width', '0.12'); p.setAttribute('height', '0.12'); p.setAttribute('depth', '0.12');
        const colors = ['#ff0055', '#ffff00', '#00ffcc', '#38bdf8'];
        p.setAttribute('color', colors[Math.floor(Math.random() * colors.length)]); p.setAttribute('position', `${x} ${y} ${z}`);
        const vx = (Math.random() - 0.5) * 6; const vy = (Math.random() - 0.5) * 6 + 2.5; const vz = (Math.random() - 0.5) * 6;
        pGroup.appendChild(p);
        let age = 0;
        const t = setInterval(() => {
          age += 16;
          let cx = x + vx * (age/1000); let cy = y + vy * (age/1000) - (0.5 * 9.8 * (age/1000)*(age/1000)); let cz = z + vz * (age/1000);
          p.setAttribute('position', `${cx} ${cy} ${cz}`);
          if (age > 800) { clearInterval(t); if (p.parentNode) p.parentNode.removeChild(p); }
        }, 16);
      }
    }

    function exitVRModeManually() {
      isTrainingActive = false; isPopping = false;
      if (gazeTimer) { clearTimeout(gazeTimer); gazeTimer = null; }
      if (elapsedInterval) clearInterval(elapsedInterval);
      document.getElementById('magic-eye-board').setAttribute('visible', 'false');
      
      // 재시작을 위해 잠금 및 버튼 상태 완전 초기화
      isBrowserUnlocked = false;
      const startBtn = document.getElementById('start-btn');
      startBtn.innerText = "▶️ 훈련 시작";
      startBtn.classList.remove('ready-to-launch');

      document.getElementById('control-panel').style.display = 'block';
      document.getElementById('exit-vr-control').style.display = 'none';
      const sceneEl = document.querySelector('a-scene');
      if (sceneEl && sceneEl.is('vr-mode')) sceneEl.exitVR();
    }

    updateGridTexture();
    setupVRHardwareLayers();
    animateBackgroundAndScroll();
    requestAnimationFrame(checkTargetGazeIntersection);
  </script>
</body>
</html>
